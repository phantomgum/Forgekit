<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendGenie</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪄</text></svg>">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0a0a0f;
            --surface: #16161e;
            --text: #ffffff;
            --text-muted: #8b8b98;
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            scrollbar-width: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: absolute;
            top: 0;
            left: 0;
            padding: 2rem;
            width: 100%;
        }

        .logo {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.01em;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 8rem 2rem 4rem 2rem;
        }

        .section-header {
            margin-bottom: 2rem;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        h2.section-heading {
            font-size: 2rem;
            margin: 0;
            color: var(--text);
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--surface);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        button {
            padding: 1rem 1.5rem;
            border-radius: 6px;
            border: 1px solid transparent;
            background-color: var(--primary);
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading spinner */
        .loader {
            display: none;
        }

        .card {
            background-color: var(--surface);
            border-radius: 6px;
            padding: 2rem;
            display: none;
            border: 1px solid var(--border);
            opacity: 0;
            transition: opacity 0.5s ease;
            position: relative;
        }

        .card.visible {
            display: block;
            opacity: 1;
        }

        .discover-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .discover-grid.visible {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .discover-grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        .card h2,
        .card h3 {
            margin-top: 0;
            color: var(--text);
            font-weight: 500;
            letter-spacing: -0.01em;
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .card h2 span,
        .card h3 span {
            color: var(--text);
        }

        .category {
            margin-bottom: 2rem;
        }

        .category:last-child {
            margin-bottom: 0;
        }

        .category-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .category-content {
            color: #d1d1d6;
            line-height: 1.6;
            font-size: 0.95rem;
            margin: 0;
        }

        .error {
            color: #ef4444;
            text-align: left;
            margin-top: 1rem;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 6px;
            word-wrap: break-word;
            font-size: 0.9rem;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
            background-color: var(--surface);
            padding: 0.35rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .tab-btn {
            background-color: transparent;
            border: none;
            color: var(--text-muted);
            border-radius: 4px;
            padding: 0.5rem 1.5rem;
            margin: 0;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .tab-btn.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .tab-btn:hover:not(.active) {
            background-color: transparent;
            color: var(--text);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInTab 0.3s ease;
        }

        @keyframes fadeInTab {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Typewriter Cursor */
        .blinking-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--primary);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.0) 0%, rgba(99, 102, 241, 0.08) 50%, rgba(99, 102, 241, 0.0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
            background-color: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .skeleton-title {
            height: 28px;
            width: 50%;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .skeleton-tagline {
            height: 18px;
            width: 75%;
            margin-bottom: 2.5rem;
        }

        .skeleton-body {
            height: 14px;
            width: 100%;
            margin-bottom: 0.75rem;
        }

        .skeleton-body.short {
            width: 40%;
        }

        .skeleton-category {
            margin-top: 2rem;
        }

        .skeleton-category-title {
            height: 10px;
            width: 20%;
            margin-bottom: 1rem;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Saved Ideas Additions */
        .save-btn {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .save-btn:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }

        .save-btn.saved {
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .save-btn:disabled {
            opacity: 1;
            cursor: default;
        }

        .card-mode-tag {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .delete-btn {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-style: italic;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">TrendGenie <span class="dot"></span></div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-target="discoverTab">Discovery</button>
            <button class="tab-btn" data-target="learnTab">Learn</button>
            <button class="tab-btn" data-target="savedTab" onclick="fetchSavedIdeas()">Saved Ideas</button>
        </div>

        <div id="discoverTab" class="tab-content active">
            <section id="discoverySection" style="margin-bottom: 4rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
                    <div class="section-header" style="margin-bottom: 0;">
                        <div class="section-label">Trending</div>
                        <h2 class="section-heading">Discover what to build</h2>
                    </div>
                    <button id="refreshDiscoverBtn" type="button">Refresh ideas</button>
                </div>

                <div class="loader" id="discoverLoader"></div>
                <div class="error" id="discoverErrorMsg"></div>

                <div class="discover-grid" id="discoverCards"></div>
            </section>
        </div>

        <div id="learnTab" class="tab-content">
            <div style="max-width: 600px; margin: 0 auto;">
                <div class="section-header" style="text-align: center;">
                    <div class="section-label">Playground</div>
                    <h2 class="section-heading">Generate a custom project</h2>
                </div>

                <form id="ideaForm" class="input-group">
                    <input type="text" id="goalInput" placeholder="e.g. Machine Learning, React, Go..." required>
                    <button type="submit">Generate</button>
                </form>

                <div class="loader" id="loader"></div>
                <div class="error" id="errorMsg"></div>

                <div class="card" id="ideaCard"></div>
            </div>
        </div>

        <div id="savedTab" class="tab-content">
            <div class="section-header">
                <div class="section-label">Library</div>
                <h2 class="section-heading">Saved Ideas</h2>
            </div>
            <div id="savedEmptyState" class="empty-state">No saved ideas yet. Generate something worth building.</div>
            <div class="discover-grid visible" id="savedCards"></div>
        </div>
    </div>

        <script>
        // Tab switching logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });
        const form = document.getElementById('ideaForm');
        const input = document.getElementById('goalInput');
        const btn = form.querySelector('button');
        const loader = document.getElementById('loader');
        const card = document.getElementById('ideaCard');
        const errorMsg = document.getElementById('errorMsg');

        const labels = {
            TITLE: "Title",
            TAGLINE: "Tagline",
            INSPIRED_BY: "Inspired By",
            DESCRIPTION: "Description",
            WHY: "Why This Works",
            FEATURES: "Core Features",
            LEARN: "What you'll learn",
            TOOLS: "Tools & Tech",
            FIRST_STEP: "First Step",
            TIME: "Estimated Time"
        };

        window.renderQueue = [];
        window.renderInterval = null;
        window.cursorEl = document.createElement('span');
        window.cursorEl.className = 'blinking-cursor';

        const skeletonHTML = `
            <div class="skeleton-title-container"><div class="skeleton skeleton-title"></div></div>
            <div class="skeleton-tagline-container"><div class="skeleton skeleton-tagline"></div></div>
            <div class="skeleton-category category-desc-container">
                <div class="skeleton skeleton-category-title"></div>
                <div class="skeleton skeleton-body"></div>
                <div class="skeleton skeleton-body short"></div>
            </div>
            <div class="skeleton-category category-firststep-container">
                <div class="skeleton skeleton-category-title"></div>
                <div class="skeleton skeleton-body"></div>
                <div class="skeleton skeleton-body short"></div>
            </div>
        `;

        function startRenderQueue(onDone = null) {
            if (window.renderInterval) clearInterval(window.renderInterval);
            window.renderQueue = [];
            window.renderInterval = setInterval(() => {
                if (window.renderQueue.length === 0) {
                    if (onDone) onDone();
                    return;
                }

                let processedChar = false;
                while (window.renderQueue.length > 0 && !processedChar) {
                    const action = window.renderQueue.shift();
                    if (action.type === 'char') {
                        if (action.el) {
                            action.el.appendChild(document.createTextNode(action.char));
                            action.el.appendChild(window.cursorEl);
                        }
                        processedChar = true; // Wait for next tick for next character
                    } else if (action.type === 'clear') {
                        if (action.el) action.el.innerHTML = '';
                    } else if (action.type === 'html') {
                        if (action.el) action.el.innerHTML = action.html;
                    } else if (action.type === 'append') {
                        if (action.parent && action.el) action.parent.appendChild(action.el);
                    } else if (action.type === 'post-process') {
                        if (action.processType === 'TOOLS') {
                            action.el.textContent = action.el.textContent.split('|').map(s => s.trim()).filter(Boolean).join(', ');
                        } else {
                            const items = action.el.textContent.split('|').map(s => s.trim()).filter(Boolean);
                            action.el.innerHTML = items.map(l => `<li>${l}</li>`).join('');
                        }
                    }
                }
            }, 18);
        }

        function createSaveButton(cardData, container) {
            const btn = document.createElement('button');
            btn.className = 'save-btn';
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg> Save idea`;
            btn.onclick = async () => {
                btn.disabled = true;
                btn.innerHTML = "Saving...";
                try {
                    const res = await fetch('/save-idea', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(cardData)
                    });
                    if (res.ok) {
                        btn.className = 'save-btn saved';
                        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Saved`;
                    } else {
                        throw new Error("Failed to save");
                    }
                } catch (e) {
                    btn.disabled = false;
                    btn.innerHTML = "Error. Try again";
                }
            };
            container.appendChild(btn);
        }

        async function fetchSavedIdeas() {
            const container = document.getElementById('savedCards');
            const emptyState = document.getElementById('savedEmptyState');
            container.innerHTML = '';
            
            try {
                const res = await fetch('/saved-ideas');
                const data = await res.json();
                
                if (data.length === 0) {
                    emptyState.style.display = 'block';
                    container.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    container.style.display = 'grid';
                    
                    data.forEach(idea => {
                        const div = document.createElement('div');
                        div.className = 'card visible';
                        div.style.display = 'block';
                        div.style.padding = '1.5rem 2rem';

                        const header = document.createElement('div');
                        header.style = 'cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none;';
                        header.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
                                <h3 style="margin:0;color:white;font-size:1.1rem;">${idea.title}</h3>
                                <span style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); background: rgba(255, 255, 255, 0.05); padding: 0.2rem 0.4rem; border-radius: 4px;">${idea.mode}</span>
                            </div>
                            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.2s ease; flex-shrink: 0; transform: rotate(0deg);"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        `;

                        const body = document.createElement('div');
                        body.style = 'display: none; margin-top: 1.5rem; position: relative; padding-bottom: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;';

                        let html = `
                            <p style="font-style:italic;margin-bottom:1.5rem;color:var(--primary);font-weight:600;font-size:1.1rem;line-height:1.4;">${idea.tagline}</p>
                        `;

                        if (idea.inspired_by) {
                            html += `
                                <div class="category">
                                    <div class="category-title">Inspired By</div>
                                    <p class="category-content">${idea.inspired_by}</p>
                                </div>
                            `;
                        }

                        html += `
                            <div class="category">
                                <div class="category-title">Description</div>
                                <p class="category-content">${idea.description}</p>
                            </div>
                            <div class="category">
                                <div class="category-title">What you'll learn</div>
                                <ul class="category-content" style="margin-top:0;padding-left:1.2rem;">
                                    ${(Array.isArray(idea.what_youll_learn) ? idea.what_youll_learn : idea.what_youll_learn.split('|')).map(s=>`<li>${(s||'').trim()}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="category">
                                <div class="category-title">Tools & Tech</div>
                                <p class="category-content">${(Array.isArray(idea.tools_and_tech) ? idea.tools_and_tech : idea.tools_and_tech.split('|')).map(s=>(s||'').trim()).join(', ')}</p>
                            </div>
                            <div class="category">
                                <div class="category-title">First Step</div>
                                <p class="category-content">${idea.first_step}</p>
                            </div>
                            <div class="category">
                                <div class="category-title">Estimated Time</div>
                                <p class="category-content">${idea.estimated_time}</p>
                            </div>
                        `;

                        body.innerHTML = html;

                        const delBtn = document.createElement('button');
                        delBtn.className = 'delete-btn';
                        delBtn.style.position = 'absolute';
                        delBtn.style.bottom = '0';
                        delBtn.style.right = '0';
                        delBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> Delete`;
                        delBtn.onclick = async () => {
                            delBtn.disabled = true;
                            delBtn.innerHTML = 'Deleting...';
                            try {
                                const dres = await fetch(`/saved-ideas/${idea.id}`, {method: 'DELETE'});
                                if (dres.ok) {
                                    div.remove();
                                    if (container.children.length === 0) {
                                        emptyState.style.display = 'block';
                                        container.style.display = 'none';
                                    }
                                } else {
                                    delBtn.disabled = false;
                                    delBtn.innerHTML = 'Error';
                                }
                            } catch (e) {
                                delBtn.disabled = false;
                                delBtn.innerHTML = 'Error';
                            }
                        };
                        
                        body.appendChild(delBtn);
                        div.appendChild(header);
                        div.appendChild(body);

                        header.onclick = () => {
                            const isCollapsed = body.style.display === 'none';
                            body.style.display = isCollapsed ? 'block' : 'none';
                            header.querySelector('.chevron').style.transform = isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
                        };

                        container.appendChild(div);
                    });
                }
            } catch (e) {
                console.error("Error fetching saved ideas:", e);
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const goal = input.value.trim();
            if (!goal) return;

            // Reset UI
            card.classList.remove('visible');
            errorMsg.style.display = 'none';
            btn.disabled = true;

            card.innerHTML = skeletonHTML;
            card.style.display = 'block';
            void card.offsetWidth;
            card.classList.add('visible');

            const eventSource = new EventSource(`/generate-idea?goal=${encodeURIComponent(goal)}`);

            let isFirstChunk = true;
            let currentField = null;
            let fieldBuffer = "";
            let currentContentEl = null;
            
            let generatedData = {
                mode: 'intent',
                title: '', tagline: '', description: '', inspired_by: '',
                what_youll_learn: '', tools_and_tech: '', first_step: '', estimated_time: ''
            };

            const fieldMapping = {
                'TITLE': 'title', 'TAGLINE': 'tagline', 'DESCRIPTION': 'description',
                'WHY': 'what_youll_learn', 'FEATURES': 'tools_and_tech', 'LEARN': 'what_youll_learn',
                'TOOLS': 'tools_and_tech', 'FIRST_STEP': 'first_step', 'TIME': 'estimated_time'
            };

            startRenderQueue(() => {
                // If queue is completely empty and stream is closed, add save btn
                if (eventSource.readyState === EventSource.CLOSED && !card.querySelector('.save-btn')) {
                    createSaveButton(generatedData, card);
                    clearInterval(window.renderInterval);
                }
            });

            eventSource.onmessage = function (event) {
                if (event.data === "[DONE]") {
                    eventSource.close();
                    btn.disabled = false;
                    window.renderQueue.push({ type: 'html', el: window.cursorEl, html: '' }); 
                    if (window.cursorEl.parentNode) window.cursorEl.parentNode.removeChild(window.cursorEl);
                    return;
                }

                if (isFirstChunk) {
                    window.renderQueue.push({ type: 'clear', el: card });
                    isFirstChunk = false;
                }

                let chunk = "";
                try { chunk = JSON.parse(event.data); } catch { chunk = event.data; }

                if (chunk.toString().startsWith('Error:')) {
                    errorMsg.textContent = chunk;
                    errorMsg.style.display = 'block';
                    eventSource.close();
                    btn.disabled = false;
                    return;
                }

                for (let i = 0; i < chunk.length; i++) {
                    const char = chunk[i];

                    if (char === '[') {
                        fieldBuffer += char;
                    } else if (char === ']' && fieldBuffer.includes('[')) {
                        fieldBuffer += char;
                        const tagMatch = fieldBuffer.match(/^\[([A-Z_]+)\]$/);
                        const closeMatch = fieldBuffer.match(/^\[\/([A-Z_]+)\]$/);

                        if (tagMatch) {
                            currentField = tagMatch[1];
                            const labelText = labels[currentField] || currentField;

                            if (currentField === 'TITLE') {
                                const header = document.createElement('h2');
                                header.style.marginTop = '0';
                                header.style.color = 'white';
                                window.renderQueue.push({ type: 'append', parent: card, el: header });

                                for (let c of labelText) {
                                    window.renderQueue.push({ type: 'char', char: c, el: header });
                                }

                                const contentEl = document.createElement('span');
                                contentEl.style.display = 'block';
                                contentEl.style.fontWeight = 'normal';
                                window.renderQueue.push({ type: 'append', parent: header, el: contentEl });
                                currentContentEl = contentEl;
                            } else if (currentField === 'TAGLINE') {
                                const p = document.createElement('p');
                                p.style = 'font-style: italic; margin-bottom: 1.5rem; color: var(--primary); font-weight: 600; font-size: 1.1rem; line-height: 1.4;';
                                window.renderQueue.push({ type: 'append', parent: card, el: p });
                                currentContentEl = p;
                            } else {
                                const catDiv = document.createElement('div');
                                catDiv.className = 'category';
                                window.renderQueue.push({ type: 'append', parent: card, el: catDiv });

                                const titleDiv = document.createElement('div');
                                titleDiv.className = 'category-title';
                                window.renderQueue.push({ type: 'append', parent: catDiv, el: titleDiv });

                                for (let c of labelText) {
                                    window.renderQueue.push({ type: 'char', char: c, el: titleDiv });
                                }

                                const contentDiv = document.createElement((currentField === 'LEARN' || currentField === 'FEATURES') ? 'ul' : 'p');
                                contentDiv.className = 'category-content';
                                if (contentDiv.tagName === 'UL') {
                                    contentDiv.style.marginTop = '0';
                                    contentDiv.style.paddingLeft = '1.2rem';
                                }
                                window.renderQueue.push({ type: 'append', parent: catDiv, el: contentDiv });
                                currentContentEl = contentDiv;
                            }

                            fieldBuffer = "";
                        } else if (closeMatch) {
                            const closedField = closeMatch[1];
                            if (closedField === "LEARN" || closedField === "FEATURES" || closedField === "TOOLS") {
                                if (currentContentEl) {
                                    window.renderQueue.push({ type: 'post-process', el: currentContentEl, processType: closedField });
                                }
                            }
                            currentField = null;
                            currentContentEl = null;
                            fieldBuffer = "";
                        } else {
                            if (currentContentEl) {
                                for (let c of fieldBuffer) {
                                    window.renderQueue.push({ type: 'char', char: c, el: currentContentEl });
                                    if (currentField && fieldMapping[currentField]) {
                                        generatedData[fieldMapping[currentField]] += c;
                                    }
                                }
                            }
                            fieldBuffer = "";
                        }
                    } else if (fieldBuffer.startsWith('[')) {
                        fieldBuffer += char;
                    } else {
                        if (currentContentEl) {
                            window.renderQueue.push({ type: 'char', char: char, el: currentContentEl });
                            if (currentField && fieldMapping[currentField]) {
                                generatedData[fieldMapping[currentField]] += char;
                            }
                        }
                    }
                }
            };

            eventSource.onerror = function (err) {
                eventSource.close();
                btn.disabled = false;
                loader.style.display = 'none';
                errorMsg.textContent = "Connection lost or stream error.";
                errorMsg.style.display = 'block';
            };
        });

        // Discovery Section Logic
        const discoverBtn = document.getElementById('refreshDiscoverBtn');
        const discoverLoader = document.getElementById('discoverLoader');
        const discoverErrorMsg = document.getElementById('discoverErrorMsg');
        const discoverCardsContainer = document.getElementById('discoverCards');

        discoverBtn.addEventListener('click', () => {
            discoverBtn.disabled = true;
            discoverErrorMsg.style.display = 'none';
            discoverCardsContainer.classList.remove('visible');
            discoverCardsContainer.innerHTML = '';

            const eventSource = new EventSource('/discover');
            
            let discoverGeneratedData = [];

            discoverCardsContainer.style.display = 'grid'; // Grid holds the 3 cards natively

            for (let i = 0; i < 3; i++) {
                const div = document.createElement('div');
                div.className = 'card visible';
                div.style.display = 'block';
                div.style.transform = 'none';
                div.style.opacity = '1';
                div.innerHTML = skeletonHTML;
                discoverCardsContainer.appendChild(div);
                discoverGeneratedData.push({
                    mode: 'discovery',
                    title: '', tagline: '', description: '', inspired_by: '',
                    what_youll_learn: '', tools_and_tech: '', first_step: '', estimated_time: ''
                });
            }
            void discoverCardsContainer.offsetWidth;
            discoverCardsContainer.classList.add('visible');

            startRenderQueue(() => {
                if (eventSource.readyState === EventSource.CLOSED && discoverCardsContainer.children[0] && !discoverCardsContainer.children[0].querySelector('.save-btn')) {
                    for (let i = 0; i < 3; i++) {
                        if (discoverCardsContainer.children[i]) {
                            createSaveButton(discoverGeneratedData[i], discoverCardsContainer.children[i]);
                        }
                    }
                    clearInterval(window.renderInterval);
                }
            });

            let isFirstChunk = true;
            let currentCardIndex = -1;
            let currentField = null;
            let fieldBuffer = "";
            let currentContentEl = null;
            
            const dFieldMapping = {
                'TITLE': 'title', 'TAGLINE': 'tagline', 'DESCRIPTION': 'description',
                'INSPIRED_BY': 'inspired_by', 'WHY': 'what_youll_learn', 'FEATURES': 'tools_and_tech',
                'LEARN': 'what_youll_learn', 'TOOLS': 'tools_and_tech', 'FIRST_STEP': 'first_step', 'TIME': 'estimated_time'
            };

            eventSource.onmessage = function (event) {
                if (event.data === "[DONE]") {
                    eventSource.close();
                    discoverBtn.disabled = false;
                    if (window.cursorEl.parentNode) window.cursorEl.parentNode.removeChild(window.cursorEl);
                    return;
                }

                if (isFirstChunk) {
                    for (let i = 0; i < 3; i++) {
                        window.renderQueue.push({ type: 'clear', el: discoverCardsContainer.children[i] });
                    }
                    isFirstChunk = false;
                }

                let chunk = "";
                try { chunk = JSON.parse(event.data); } catch { chunk = event.data; }

                if (chunk.toString().startsWith('Error:')) {
                    discoverErrorMsg.textContent = chunk;
                    discoverErrorMsg.style.display = 'block';
                    eventSource.close();
                    discoverBtn.disabled = false;
                    return;
                }

                for (let i = 0; i < chunk.length; i++) {
                    const char = chunk[i];

                    if (char === '[') {
                        fieldBuffer += char;
                    } else if (char === ']' && fieldBuffer.includes('[')) {
                        fieldBuffer += char;
                        const tagMatch = fieldBuffer.match(/^\[([A-Z_]+)\]$/);
                        const closeMatch = fieldBuffer.match(/^\[\/([A-Z_]+)\]$/);

                        if (tagMatch) {
                            currentField = tagMatch[1];
                            const labelText = labels[currentField] || currentField;

                            if (currentField === 'TITLE') {
                                currentCardIndex++;
                            }

                            const targetCard = discoverCardsContainer.children[Math.min(2, Math.max(0, currentCardIndex))];

                            if (targetCard) {
                                if (currentField === 'TITLE') {
                                    const header = document.createElement('h3');
                                    header.style.marginTop = '0';
                                    header.style.color = 'white';
                                    window.renderQueue.push({ type: 'append', parent: targetCard, el: header });

                                    for (let c of labelText) {
                                        window.renderQueue.push({ type: 'char', char: c, el: header });
                                    }

                                    const contentEl = document.createElement('span');
                                    contentEl.style.display = 'block';
                                    contentEl.style.fontWeight = 'normal';
                                    window.renderQueue.push({ type: 'append', parent: header, el: contentEl });
                                    currentContentEl = contentEl;
                                } else if (currentField === 'TAGLINE') {
                                    const p = document.createElement('p');
                                    p.style = 'font-style: italic; margin-bottom: 1.5rem; color: var(--primary); font-weight: 600; font-size: 1.1rem; line-height: 1.4;';
                                    window.renderQueue.push({ type: 'append', parent: targetCard, el: p });
                                    currentContentEl = p;
                                } else {
                                    const catDiv = document.createElement('div');
                                    catDiv.className = 'category';
                                    window.renderQueue.push({ type: 'append', parent: targetCard, el: catDiv });

                                    const titleDiv = document.createElement('div');
                                    titleDiv.className = 'category-title';
                                    window.renderQueue.push({ type: 'append', parent: catDiv, el: titleDiv });

                                    for (let c of labelText) {
                                        window.renderQueue.push({ type: 'char', char: c, el: titleDiv });
                                    }

                                    const contentDiv = document.createElement((currentField === 'LEARN' || currentField === 'FEATURES') ? 'ul' : 'p');
                                    contentDiv.className = 'category-content';
                                    if (contentDiv.tagName === 'UL') {
                                        contentDiv.style.marginTop = '0';
                                        contentDiv.style.paddingLeft = '1.2rem';
                                    }
                                    window.renderQueue.push({ type: 'append', parent: catDiv, el: contentDiv });
                                    currentContentEl = contentDiv;
                                }
                            }

                            fieldBuffer = "";
                        } else if (closeMatch) {
                            const closedField = closeMatch[1];
                            if (closedField === "LEARN" || closedField === "FEATURES" || closedField === "TOOLS") {
                                if (currentContentEl) {
                                    window.renderQueue.push({ type: 'post-process', el: currentContentEl, processType: closedField });
                                }
                            }
                            currentField = null;
                            currentContentEl = null;
                            fieldBuffer = "";
                        } else {
                            if (currentContentEl) {
                                for (let c of fieldBuffer) {
                                    window.renderQueue.push({ type: 'char', char: c, el: currentContentEl });
                                    if (currentField && dFieldMapping[currentField] && currentCardIndex >= 0 && currentCardIndex < 3) {
                                        discoverGeneratedData[currentCardIndex][dFieldMapping[currentField]] += c;
                                    }
                                }
                            }
                            fieldBuffer = "";
                        }
                    } else if (fieldBuffer.startsWith('[')) {
                        fieldBuffer += char;
                    } else {
                        if (currentContentEl) {
                            window.renderQueue.push({ type: 'char', char: char, el: currentContentEl });
                            if (currentField && dFieldMapping[currentField] && currentCardIndex >= 0 && currentCardIndex < 3) {
                                discoverGeneratedData[currentCardIndex][dFieldMapping[currentField]] += char;
                            }
                        }
                    }
                }
            };

            eventSource.onerror = function (err) {
                eventSource.close();
                discoverBtn.disabled = false;
                discoverLoader.style.display = 'none';
                discoverErrorMsg.textContent = "Connection lost or stream error.";
                discoverErrorMsg.style.display = 'block';
            };
        });
        
        // Load initial tab logic
        fetchSavedIdeas();
    </script>
</body>

</html>
